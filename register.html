<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlateZero Register</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">

    <div class="profile-card" style="justify-content:center;">
        <h2>🌿 Join PlateZero</h2>
    </div>

    <div class="form-card">
        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter college email" required>

            <label>Hostel / Block</label>
            <input type="text" placeholder="e.g. A Block" required>

            <label>Password</label>
            <input type="password" placeholder="Create password" required>

            <button type="submit" class="snap-btn">Register</button>
        </form>
    </div>

    <p class="footer-note">
        Already registered? <a href="login.html">Go to Dashboard</a>
        
        


    </p>

</div>

</body>
</html>
