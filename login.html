<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container1">
        <div class="form box" id="loginbox">
            <form id="loginForm">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="loginMessage" style="color: #d9534f; margin-top: 10px;"></p>
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch("http://127.0.0.1:8000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.status === "success") {
                    if (data.user.role === "admin") {
                        localStorage.setItem("admin_id", data.user.id);
                        localStorage.setItem("admin_name", data.user.name);
                        localStorage.setItem("admin_role", data.user.role);
                        window.location.href = "admin.html";
                    } else {
                        localStorage.setItem("student_id", data.user.id);
                        localStorage.setItem("student_name", data.user.name);
                        localStorage.setItem("student_role", data.user.role);
                        window.location.href = "student.html";
                    }
                } else {
                    document.getElementById('loginMessage').innerText = data.message || "Login failed";
                }
            } catch (err) {
                document.getElementById('loginMessage').innerText = "Failed to connect to server.";
            }
        });
    </script>

    </div>
    </div>

</body>

</html>
